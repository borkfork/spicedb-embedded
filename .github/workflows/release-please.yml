name: Release Please

on:
  push:
    branches: [main]

permissions:
  actions: write # Dispatch publish/lockfile workflows via gh workflow run
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      grpc_release_created: ${{ steps.release.outputs['rust/spicedb-grpc-tonic--release_created'] }}
      grpc_tag_name: ${{ steps.release.outputs['rust/spicedb-grpc-tonic--tag_name'] }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      prs: ${{ steps.release.outputs.prs }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  dispatch-publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch publish workflow
        run: gh workflow run publish.yml -f tag_name=${{ needs.release-please.outputs.tag_name }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

  dispatch-publish-grpc-tonic:
    needs: release-please
    if: needs.release-please.outputs.grpc_release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch publish grpc-tonic workflow
        run: gh workflow run publish-grpc-tonic.yml -f tag_name=${{ needs.release-please.outputs.grpc_tag_name }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

  dispatch-update-lockfiles:
    needs: release-please
    if: needs.release-please.outputs.prs_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch lockfile updates for root package PR
        run: |
          set -eo pipefail
          # Only update lockfiles for the root package PR; grpc-tonic uses the rust
          # release type which manages its own Cargo.toml, and its version bumps are
          # incompatible with the workspace until the consuming crates adopt them.
          BRANCH=$(echo '${{ needs.release-please.outputs.prs }}' | jq -r '.[] | select(.headBranchName | contains("grpc-tonic") | not) | .headBranchName' | head -n1)
          if [ -n "$BRANCH" ]; then
            echo "Dispatching lockfile update for branch: $BRANCH"
            gh workflow run update-lockfiles.yml -f branch="$BRANCH"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
