# Update Cargo.lock and package-lock.json on release-please PR branches.
# The "simple" release type does not natively update lock files, so this companion
# workflow updates them after release-please creates or updates a PR.
#
# Dispatched from release-please.yml after PR creation.

name: Update lockfiles on release PRs

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Release PR branch to update lockfiles on'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-lockfiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - uses: jdx/mise-action@v3
        with:
          install_args: "rust node"

      - name: Update Cargo.lock
        run: cargo update -w

      - name: Update package-lock.json
        working-directory: node
        run: npm install

      - name: Commit lockfile updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock node/package-lock.json
          git diff --staged --quiet || git commit -m "chore: update lockfiles"
          git push
