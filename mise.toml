# Minimum required mise version
min_version = '2025.9.19'

[tools]
rust = { version = "1.91.1", components = "rustfmt,clippy" }
buf = "1.49"
protoc = "33.5"
"github:authzed/spicedb" = { version = "1.49.0", version_prefix = "v" }
"github:EmbarkStudios/cargo-deny" = { version = "0.19.0", version_prefix = "" }
taplo = "0.10.0"
jq = "1.7"
shellcheck = "0.10.0"
shfmt = "3.8.0"
go = "1.25"
node = "22"
python = "3.11"
java = "temurin-17"
maven = "3.9.9"
dotnet = "9.0"

[tasks.check]
description = "Run format checks, lint, ReSharper, and tests for all languages"
depends = [
  "format-check",
  "rust-clippy",
  "rust-cargo-deny",
  "csharp-resharper-check",
  "test",
]

# ============================================================================
# SpiceDB shared/c build tasks
# ============================================================================

[tasks.shared-c-build]
description = "Build the SpiceDB C-shared library from Go source (CGO)"
run = "bash scripts/shared-c-build.sh"

[tasks.shared-c-rebuild]
description = "Force rebuild the SpiceDB C-shared library"
run = "bash scripts/shared-c-rebuild.sh"

[tasks.format-check]
description = "Verify format for all languages"
depends = [
  "rust-format-check",
  "bash-format-check",
  "toml-format-check",
  "actions-format-check",
  "python-format-check",
  "java-format-check",
  "csharp-format-check",
  "node-format-check",
]

[tasks.csharp-resharper-check]
description = "Run ReSharper InspectCode (C#) and fail if issues found"
dir = "csharp"
run = "dotnet tool restore && dotnet tool run jb -- inspectcode SpiceDbEmbedded.sln -o=resharper-inspect.sarif && (jq -e '.runs[0].results | length == 0' resharper-inspect.sarif >/dev/null) || (echo 'ReSharper found issues; see resharper-inspect.sarif' && exit 1)"

[tasks.bash-format-check]
description = "Lint and verify Bash script format (check only, no writes)"
dir = "scripts"
run = "shellcheck *.sh && shfmt -d -s ."

[tasks.actions-format-check]
description = "Lint GitHub Actions workflows and inline shell (via actionlint + shellcheck)"
tools.actionlint = "1.7.10"
run = "actionlint"

[tasks.rust-install-rustfmt]
description = "Install rustfmt"
run = "rustup component add --toolchain nightly rustfmt"

[tasks.rust-format-check]
description = "Verify Rust format"
depends = ["rust-install-rustfmt"]
run = "cargo +nightly fmt --all --check"

[tasks.python-install]
description = "Run pip install"
dir = "python"
run = "pip install -e \".[dev]\" -q"

[tasks.python-format-check]
description = "Verify Python format"
depends = ["python-install"]
dir = "python"
run = "ruff format --check ."

[tasks.java-format-check]
description = "Verify Java format"
dir = "java"
run = "mvn spotless:check"

[tasks.csharp-format-check]
description = "Verify C# format"
dir = "csharp"
run = "dotnet format SpiceDbEmbedded.sln --verify-no-changes"

[tasks.node-format-check]
description = "Verify Node.js package format"
dir = "node"
run = "npm run format:check"

[tasks.reformat]
description = "Reformat all languages"
depends = [
  "rust-reformat",
  "bash-reformat",
  "toml-reformat",
  "python-reformat",
  "java-reformat",
  "csharp-reformat",
  "csharp-reformat-resharper",
  "node-reformat",
]

[tasks.bash-reformat]
description = "Reformat Bash scripts (writes changes)"
dir = "scripts"
run = "shfmt -w -s ."

[tasks.rust-reformat]
description = "Reformat Rust"
depends = ["rust-install-rustfmt"]
run = "cargo +nightly fmt --all"

[tasks.python-reformat]
description = "Reformat Python"
depends = ["python-install"]
dir = "python"
run = "ruff format ."

[tasks.java-reformat]
description = "Reformat Java"
dir = "java"
run = "mvn spotless:apply"

[tasks.csharp-reformat]
description = "Reformat C#"
dir = "csharp"
run = "dotnet format SpiceDbEmbedded.sln"

[tasks.csharp-reformat-resharper]
description = "Apply ReSharper CleanupCode (C#); excludes files that trigger ReSharper CLI HTML-injection bug"
dir = "csharp"
run = "dotnet tool restore && dotnet tool run jb -- cleanupcode SpiceDbEmbedded.sln --profile=\"Built-in: Reformat Code\" --exclude=\"**/EmbeddedSpiceDb.cs;**/SpiceDbException.cs;**/SpiceDbFfi.cs;**/TcpChannel.cs;**/UnixSocketChannel.cs;**/EmbeddedSpiceDbTests.cs\""

[tasks.node-install]
description = "Run npm install"
dir = "node"
run = "npm install"

[tasks.node-reformat]
description = "Reformat Node.js package"
depends = ["node-install"]
dir = "node"
run = "npm run format"

[tasks.rust-clippy]
description = "Run Clippy linter (main crate only so only current platform's -sys is built)"
run = "cargo clippy -p spicedb-embedded --locked --all-features --all-targets"

[tasks.rust-docsrs]
description = "Check that documentation builds on docs.rs (uses published spicedb-grpc-tonic, no buf/protoc needed)"
run = """
#!/usr/bin/env bash
set -e
# Strip path overrides so cargo resolves spicedb-grpc-tonic from crates.io (which has checked-in generated code, no buf/protoc needed).
trap 'git checkout rust/Cargo.toml rust/spicedb-embedded-sys/Cargo.toml Cargo.lock 2>/dev/null' EXIT
sed -i.bak 's|, path = "spicedb-grpc-tonic"||;s|, path = "../spicedb-grpc-tonic"||' rust/Cargo.toml rust/spicedb-embedded-sys/Cargo.toml
rm -f rust/Cargo.toml.bak rust/spicedb-embedded-sys/Cargo.toml.bak
cargo +nightly fetch
DOCS_RS=1 cargo +nightly doc -p spicedb-embedded-sys --no-deps --offline
"""

[tasks.test]
description = "Run tests for all languages"
depends = ["rust-test", "java-test", "python-test", "csharp-test", "node-test"]

[tasks.docker-test]
description = "Build and run all tests in Docker (uses BuildKit cache for faster rebuilds)"
# Use native platform (omit --platform) for speed—QEMU emulation on ARM is ~5–10x slower.
# For amd64-only testing: docker build --platform linux/amd64 ...
run = "DOCKER_BUILDKIT=1 docker build -t spicedb-embedded-test -f Dockerfile ."

[tasks.rust-stage-prebuild]
description = "Stage prebuilds for rust"
depends = ["shared-c-build"]
run = "bash ./scripts/stage-rust-prebuild.sh"

[tasks.node-stage-prebuild]
description = "Stage prebuilds for node"
depends = ["shared-c-build"]
run = "bash ./scripts/stage-node-prebuild.sh"

[tasks.java-stage-prebuild]
description = "Stage prebuilds for java"
depends = ["shared-c-build"]
run = "bash ./scripts/stage-java-prebuild.sh"

[tasks.python-stage-prebuild]
description = "Stage prebuilds for python"
depends = ["shared-c-build"]
run = "bash ./scripts/stage-rust-prebuild.sh"

[tasks.csharp-stage-prebuild]
description = "Stage prebuilds for C#"
depends = ["shared-c-build"]
run = "bash ./scripts/stage-csharp-prebuild.sh"

[tasks.rust-test]
description = "Run Rust tests (main crate only so only current platform's -sys is built)"
depends = ["rust-stage-prebuild"]
run = "cargo test -p spicedb-embedded --locked"

[tasks.rust-cargo-deny]
description = "Run cargo-deny (license, advisory, ban checks)"
run = "cargo deny check -c deny.toml"

[tasks.rust-publish-dry-run]
description = "Sync shared/c into rust/shared and run cargo publish --dry-run (same as release workflow)"
run = "mkdir -p rust/shared && cp -r shared/c rust/shared/ && git add -f rust/shared/ && cargo publish -p spicedb-embedded --dry-run --allow-dirty; git reset HEAD rust/shared/ 2>/dev/null || true"

[tasks.toml-format-check]
description = "Check TOML formatting"
run = "taplo format --check"

[tasks.toml-reformat]
description = "Reformat TOML files"
run = "taplo format"

# ============================================================================
# Java tasks
# ============================================================================

[tasks.java-build]
description = "Build the Java library"
depends = ["java-stage-prebuild"]
dir = "java"
run = "mvn compile"

[tasks.java-test]
description = "Build and test the Java library"
depends = ["java-stage-prebuild"]
dir = "java"
run = "mvn test"

# ============================================================================
# Python tasks
# ============================================================================

[tasks.python-build]
description = "Build the Python package"
depends = ["python-stage-prebuild"]
dir = "python"
run = "pip install -e ."

[tasks.python-test]
description = "Build and test the Python package"
depends = ["python-stage-prebuild"]
dir = "python"
run = "pip install -e '.[dev]' && pytest"

# ============================================================================
# C# / .NET tasks
# ============================================================================

[tasks.csharp-build]
description = "Build the C# library"
depends = ["csharp-stage-prebuild"]
dir = "csharp"
run = "dotnet build SpiceDbEmbedded.sln"

[tasks.csharp-test]
description = "Build and test the C# library"
depends = ["csharp-stage-prebuild"]
dir = "csharp"
run = "dotnet build SpiceDbEmbedded.sln && dotnet test SpiceDbEmbedded.Tests/SpiceDbEmbedded.Tests.csproj --no-build"

# ============================================================================
# Node.js
# ============================================================================

[tasks.node-build]
description = "Build the Node.js package"
depends = ["node-stage-prebuild"]
dir = "node"
run = "npm run build"

[tasks.node-test]
description = "Build and test the Node.js package"
depends = ["node-build"]
dir = "node"
run = "npm test"
